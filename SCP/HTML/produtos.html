<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../CSS/clientes.css">

  <title>Produtos</title>
</head>

<body>

  <nav class="navbar navbar-expand-lg fixed-top navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="homepage.html">
        <img src="https://cdn-icons-png.flaticon.com/512/3441/3441648.png" height="30" alt="">
        HOME
      </a>
    </div>
  </nav>

  <main class="container">

    <h1>Cadastro de Produtos</h1>

    <form id="formProduto" class="form-produto">

      <div class="campo">
        <label for="produtoId">Código</label>
        <input type="number" id="produtoId" placeholder="Gerado automaticamente" readonly>
      </div>

      <div class="campo">
        <label for="categoriaId">Categoria</label>

        <select id="categoriaId" required>
          <option value="">
            Selecione uma categoria
          </option>
        </select>
      </div>

      <div class="campo">
        <label for="valorVenda">Valor de Venda</label>

        <input type="number" step="0.01" id="valorVenda" placeholder="Digite o valor de venda" required>
      </div>

      <div class="campo">
        <label for="dataCadastro">Data de Cadastro</label>

        <input type="date" id="dataCadastro" required>
      </div>

      <div class="campo">
        <label for="statusProduto">Status</label>

        <select id="statusProduto" required>
          <option value="">Selecione</option>
          <option value="A">Ativo</option>
          <option value="I">Inativo</option>
        </select>
      </div>

      <div class="campo nome">
        <label for="descricaoProduto">Descrição</label>

        <input type="text" id="descricaoProduto" maxlength="100" placeholder="Digite a descrição" required>
      </div>

      <div class="campo nome">
        <label for="observacaoProduto">Observação</label>

        <textarea id="observacaoProduto" rows="4" placeholder="Digite uma observação"></textarea>
      </div>

      <div class="acoes">

        <button type="reset" class="btn-limpar">
          Limpar
        </button>

        <button type="button" id="btnCancelarEdicao" class="btn-cancelar-edicao">
          Cancelar edição
        </button>

        <button type="submit" id="btnSalvar" class="btn-salvar">
          Salvar
        </button>

      </div>

    </form>

    <p id="mensagem" class="mensagem"></p>

    <h2>Produtos Cadastrados</h2>

    <table>

      <thead>
        <tr>
          <th>Código</th>
          <th>Categoria</th>
          <th>Descrição</th>
          <th>Observação</th>
          <th>Valor</th>
          <th>Cadastro</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="tabelaProdutos">
        <tr>
          <td colspan="8">
            Carregando produtos...
          </td>
        </tr>
      </tbody>

    </table>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../JS/produtos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
