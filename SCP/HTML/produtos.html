<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../CSS/produtos.css">
  <link rel="stylesheet" href="../CSS/homepage.css">

  <title>Produtos</title>
</head>

<body>

  <aside class="sidebar-visual" aria-label="Barra lateral decorativa">
    <div>
      <div class="sidebar-brand">
        <span class="brand-icon">ST</span>
        <div>
          <strong>SaberTI</strong>
          <small>curso / painel</small>
        </div>
      </div>
      <p class="sidebar-copy">Criador do Sistema: Enzo Seiti Hashimoto</p>
      <p class="sidebar-copy">Orientador do Curso: Prof. Vitinho</p>
    </div>
  </aside>

  <nav class="navbar navbar-expand-lg fixed-top navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="homepage.html">
        <img src="https://cdn-icons-png.flaticon.com/512/3441/3441648.png" height="30" alt="" style="filter: brightness(0) saturate(100%) invert(72%) sepia(38%) saturate(421%) hue-rotate(206deg);">
        HOME
      </a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <div class="profile-chip" aria-label="Perfil do usuário">
          <span class="profile-icon">👤</span>
          <span class="profile-text">
            <strong id="nomeUsuarioLogado">Nome do usuário</strong>
            <small id="emailUsuarioLogado">Perfil</small>
          </span>
        </div>
      </div>
    </div>
  </nav>

  <main class="homepage-main container">

    <h1>Cadastro de Produtos</h1>

    <form id="formProduto" class="form-produto">

      <div class="campo">
        <label for="produtoId">Código</label>
        <input type="number" id="produtoId" placeholder="Gerado automaticamente" readonly>
      </div>

      <div class="campo">
        <label for="categoriaId">Categoria</label>

        <select id="categoriaId" required>
          <option value="">
            Selecione uma categoria
          </option>
        </select>
      </div>

      <div class="campo">
        <label for="valorVenda">Valor de Venda</label>

        <input type="number" step="0.01" id="valorVenda" placeholder="Digite o valor de venda" required>
      </div>

      <div class="campo">
        <label for="dataCadastro">Data de Cadastro</label>

        <input type="date" id="dataCadastro" required>
      </div>

      <div class="campo">
        <label for="statusProduto">Status</label>

        <select id="statusProduto" required>
          <option value="">Selecione</option>
          <option value="A">Ativo</option>
          <option value="I">Inativo</option>
        </select>
      </div>

      <div class="campo nome">
        <label for="descricaoProduto">Descrição</label>

        <input type="text" id="descricaoProduto" maxlength="100" placeholder="Digite a descrição" required>
      </div>

      <div class="campo nome">
        <label for="observacaoProduto">Observação</label>

        <textarea id="observacaoProduto" rows="4" placeholder="Digite uma observação"></textarea>
      </div>

      <div class="acoes">

        <button type="reset" class="btn-limpar">
          Limpar
        </button>

        <button type="button" id="btnCancelarEdicao" class="btn-cancelar-edicao">
          Cancelar edição
        </button>

        <button type="submit" id="btnSalvar" class="btn-salvar">
          Salvar
        </button>

      </div>

    </form>

    <p id="mensagem" class="mensagem"></p>

    <div class="topo-lista">
      <h2>Produtos Cadastrados</h2>
    </div>

    <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
      <input
        type="search"
        id="barraPesquisaProduto"
        class="form-control"
        placeholder="Pesquise por código, categoria, descrição, status ou valor"
        aria-label="Pesquisar produtos"
      >
      <button type="button" id="btnPesquisarProduto" class="btn btn-primary">Pesquisar</button>
      <button type="button" id="btnLimparPesquisaProduto" class="btn btn-outline-secondary">Limpar</button>
    </div>

    <table>

      <thead>
        <tr>
          <th>Código</th>
          <th>Categoria</th>
          <th>Descrição</th>
          <th>Observação</th>
          <th>Valor</th>
          <th>Cadastro</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="tabelaProdutos">
        <tr>
          <td colspan="8">
            Carregando produtos...
          </td>
        </tr>
      </tbody>

    </table>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../JS/produtos.js"></script>
  <script src="../JS/homepage.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
