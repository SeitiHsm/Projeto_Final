<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualização do Orçamento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="..//CSS/pdforcamentos.css">
</head>

<body>
  <main class="page-shell">
    <section class="card-visualizacao">
      <div class="no-print">
        <a class="btn btn-secondary-custom" href="orcamentos.html">← Voltar para orçamentos</a>
        <button id="btnImprimirPdf" class="btn btn-primary-custom" type="button">🖨️ Imprimir como PDF</button>
      </div>

      <span class="badge-top">📄 Visualização do orçamento</span>
      <h1 class="titulo" id="tituloOrcamento">Orçamento</h1>
      <p class="subtitulo" id="descricaoOrcamento">Carregando informações...</p>

      <div class="grid-detalhes" id="detalhesResumo"></div>

      <h2 class="h5 mt-3">Itens do orçamento</h2>
      <div id="conteudoItens" class="table-responsive"></div>

      <div class="total-box" id="resumoTotal">Total: R$ 0,00</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="..//JS/visualizacao_orcamento.js"></script>
</body>

</html>
