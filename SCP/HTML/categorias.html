<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../CSS/categorias.css">
    <link rel="stylesheet" href="../CSS/homepage.css">
    <title>Categorias</title>
</head>
<body>
  <aside class="sidebar-visual" aria-label="Barra lateral decorativa">
    <div>
      <div class="sidebar-brand">
        <span class="brand-icon">ST</span>
        <div>
          <strong>SaberTI</strong>
          <small>curso / painel</small>
        </div>
      </div>
      <p class="sidebar-copy">Criador do Sistema: Enzo Seiti Hashimoto</p>
      <p class="sidebar-copy">Orientador do Curso: Prof. Vitinho</p>
    </div>
  </aside>

  <nav class="navbar navbar-expand-lg fixed-top navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="homepage.html">
        <img src="https://cdn-icons-png.flaticon.com/512/3441/3441648.png" height="30" alt="">
        HOME
      </a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <div class="profile-chip" aria-label="Perfil do usuário">
          <span class="profile-icon">👤</span>
          <span class="profile-text">
            <strong>Nome do usuário</strong>
            <small>Perfil</small>
          </span>
        </div>
      </div>
    </div>
  </nav>

  <main class="homepage-main container">

    <!-- Título da tela -->
    <h1>Cadastro de Categoria</h1>

    <!-- Formulário usado tanto para cadastrar quanto para editar -->
    <form id="formCategoria" class="form-categoria">

      <!-- Campo CATEGORIAID.
           No banco ele é SERIAL, então é gerado automaticamente.
           Por isso o campo fica readonly. -->
      <div class="campo">
        <label for="categoriaId">Código</label>
        <input
          type="number"
          id="categoriaId"
          placeholder="Gerado automaticamente"
          readonly
        >
      </div>

      <!-- Campo Descrição_Categoria.
           Na tabela é VARCHAR(100), então usamos maxlength="100". -->
      <div class="campo">
        <label for="descricaoCategoria">Descrição da Categoria</label>
        <input
          type="text"
          id="descricaoCategoria"
          maxlength="100"
          placeholder="Digite a descrição da categoria"
          required
        >
      </div>
  
      <!-- Botões do formulário -->
      <div class="acoes">

        <!-- Limpa os campos do formulário -->
        <button type="reset" class="btn-limpar">
          Limpar
        </button>

        <!-- Cancela a edição e volta para o modo cadastro.
             Esse botão começa escondido. -->
        <button
          type="button"
          id="btnCancelarEdicao"
          class="btn-cancelar-edicao"
        >
          Cancelar edição
        </button>

        <!-- Botão principal.
             Quando estiver cadastrando, aparece como "Salvar".
             Quando estiver editando, o JavaScript muda para "Atualizar". -->
        <button type="submit" id="btnSalvar" class="btn-salvar">
          Salvar
        </button>
      </div>
    </form>

    <!-- Aqui aparecerão mensagens como:
         "Cliente salvo com sucesso"
         "Erro ao salvar cliente"
         "Cliente excluído com sucesso" -->
    <p id="mensagem" class="mensagem"></p>

    <div class="topo-lista">
      <h2>Categorias Cadastradas</h2>

      <div class="campo campo-busca">
        <label for="buscaCategorias">Pesquisar</label>
        <input type="search" id="buscaCategorias" placeholder="Digite código ou descrição...">
      </div>
    </div>

    <!-- Tabela onde os clientes serão exibidos -->
    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Descrição</th>
          <th>Ações</th>
        </tr>
      </thead>

      <!-- O tbody começa com uma mensagem.
           Depois o JavaScript substitui esse conteúdo pelos dados do Supabase. -->
      <tbody id="tabelaCategorias">
        <tr>
          <td colspan="2">Carregando categorias...</td>
        </tr>
      </tbody>
    </table>
  </main>

  <!-- Biblioteca JavaScript do Supabase.
       Ela precisa ser carregada antes do nosso app.js. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Nosso arquivo JavaScript separado -->
  <script src="..//JS/categorias.js"></script>
    
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
