<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="..//CSS/clientes.css">
    <link rel="stylesheet" href="../CSS/homepage.css">
    <title>Clientes</title>
</head>
<body>
  <aside class="sidebar-visual" aria-label="Barra lateral decorativa">
    <div>
      <div class="sidebar-brand">
        <span class="brand-icon">ST</span>
        <div>
          <strong>SaberTI</strong>
          <small>curso / painel</small>
        </div>
      </div>
      <p class="sidebar-copy">Criador do Sistema: Enzo Seiti Hashimoto</p>
      <p class="sidebar-copy">Orientador do Curso: Prof. Vitinho</p>
    </div>
  </aside>

  <nav class="navbar navbar-expand-lg fixed-top navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="homepage.html">
        <img src="https://cdn-icons-png.flaticon.com/512/3441/3441648.png" height="30" alt="" style="filter: brightness(0) saturate(100%) invert(72%) sepia(38%) saturate(421%) hue-rotate(206deg);">
        HOME
      </a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <div class="profile-chip" aria-label="Perfil do usuário">
          <span class="profile-icon">👤</span>
          <span class="profile-text">
            <strong id="nomeUsuarioLogado">Nome do usuário</strong>
            <small id="emailUsuarioLogado">Perfil</small>
          </span>
        </div>
      </div>
    </div>
  </nav>

  <main class="homepage-main container">

    <h1>Cadastro de Cliente</h1>

    <form id="formCliente" class="form-cliente">

      <div class="campo">
        <label for="clienteId">Código</label>
        <input
          type="number"
          id="clienteId"
          placeholder="Gerado automaticamente"
          readonly
        >
      </div>

      <div class="campo">
        <label for="tipoCliente">Tipo de Cliente</label>
        <select id="tipoCliente" required>
          <option value="">Selecione</option>
          <option value="F">Pessoa Física</option>
          <option value="J">Pessoa Jurídica</option>
        </select>
      </div>

      <div class="campo">
        <label for="cpfCnpjCliente">CPF / CNPJ</label>
        <input
          type="text"
          id="cpfCnpjCliente"
          maxlength="18"
          placeholder="Digite o CPF ou CNPJ"
          required
        >
      </div>

      <div class="campo nome">
        <label for="nomeCliente">Nome do Cliente</label>
        <input
          type="text"
          id="nomeCliente"
          maxlength="100"
          placeholder="Digite o nome do cliente"
          required
        >
      </div>

      <div class="acoes">

        <button type="reset" class="btn-limpar">
          Limpar
        </button>

        <button
          type="button"
          id="btnCancelarEdicao"
          class="btn-cancelar-edicao"
        >
          Cancelar edição
        </button>

        <button type="submit" id="btnSalvar" class="btn-salvar">
          Salvar
        </button>
      </div>
    </form>

    <p id="mensagem" class="mensagem"></p>

    <div class="topo-lista">
      <h2>Clientes Cadastrados</h2>
    </div>

    <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
      <input
        type="search"
        id="barraPesquisaCliente"
        class="form-control"
        placeholder="Pesquise por código, tipo, CPF/CNPJ ou nome"
        aria-label="Pesquisar clientes"
      >
      <button type="button" id="btnPesquisarCliente" class="btn btn-primary">Pesquisar</button>
      <button type="button" id="btnLimparPesquisaCliente" class="btn btn-outline-secondary">Limpar</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Tipo</th>
          <th>CPF / CNPJ</th>
          <th>Nome</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="tabelaClientes">
        <tr>
          <td colspan="5">Carregando clientes...</td>
        </tr>
      </tbody>
    </table>
  </main>
    
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="..//JS/clientes.js"></script>
  <script src="../JS/homepage.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
