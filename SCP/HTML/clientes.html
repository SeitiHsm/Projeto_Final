<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="..//CSS/clientes.css">
    <title>Clientes</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="homepage.html">
        <img src="https://cdn-icons-png.flaticon.com/512/3441/3441648.png" height="30" alt="">
        HOME
      </a>
    </div>
  </nav>

  <!-- Conteúdo principal da página -->
  <main class="container">

    <!-- Título da tela -->
    <h1>Cadastro de Cliente</h1>

    <!-- Formulário usado tanto para cadastrar quanto para editar -->
    <form id="formCliente" class="form-cliente">

      <!-- Campo CLIENTEID.
           No banco ele é SERIAL, então é gerado automaticamente.
           Por isso o campo fica readonly. -->
      <div class="campo">
        <label for="clienteId">Código</label>
        <input
          type="number"
          id="clienteId"
          placeholder="Gerado automaticamente"
          readonly
        >
      </div>

      <!-- Campo TIPO_CLIENTE.
           Na tabela é CHAR(1), então salvamos apenas uma letra:
           F para Pessoa Física
           J para Pessoa Jurídica -->
      <div class="campo">
        <label for="tipoCliente">Tipo de Cliente</label>
        <select id="tipoCliente" required>
          <option value="">Selecione</option>
          <option value="F">Pessoa Física</option>
          <option value="J">Pessoa Jurídica</option>
        </select>
      </div>

      <!-- Campo CPF_CNPJ_CLIENTE.
           Na tabela é VARCHAR(18), então usamos maxlength="18". -->
      <div class="campo">
        <label for="cpfCnpjCliente">CPF / CNPJ</label>
        <input
          type="text"
          id="cpfCnpjCliente"
          maxlength="18"
          placeholder="Digite o CPF ou CNPJ"
          required
        >
      </div>

      <!-- Campo NOME_CLIENTE.
           Na tabela é VARCHAR(100), então usamos maxlength="100". -->
      <div class="campo nome">
        <label for="nomeCliente">Nome do Cliente</label>
        <input
          type="text"
          id="nomeCliente"
          maxlength="100"
          placeholder="Digite o nome do cliente"
          required
        >
      </div>

      <!-- Botões do formulário -->
      <div class="acoes">

        <!-- Limpa os campos do formulário -->
        <button type="reset" class="btn-limpar">
          Limpar
        </button>

        <!-- Cancela a edição e volta para o modo cadastro.
             Esse botão começa escondido. -->
        <button
          type="button"
          id="btnCancelarEdicao"
          class="btn-cancelar-edicao"
        >
          Cancelar edição
        </button>

        <!-- Botão principal.
             Quando estiver cadastrando, aparece como "Salvar".
             Quando estiver editando, o JavaScript muda para "Atualizar". -->
        <button type="submit" id="btnSalvar" class="btn-salvar">
          Salvar
        </button>
      </div>
    </form>

    <!-- Aqui aparecerão mensagens como:
         "Cliente salvo com sucesso"
         "Erro ao salvar cliente"
         "Cliente excluído com sucesso" -->
    <p id="mensagem" class="mensagem"></p>

    <!-- Título da listagem -->
    <h2>Clientes Cadastrados</h2>

    <!-- Tabela onde os clientes serão exibidos -->
    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Tipo</th>
          <th>CPF / CNPJ</th>
          <th>Nome</th>
          <th>Ações</th>
        </tr>
      </thead>

      <!-- O tbody começa com uma mensagem.
           Depois o JavaScript substitui esse conteúdo pelos dados do Supabase. -->
      <tbody id="tabelaClientes">
        <tr>
          <td colspan="5">Carregando clientes...</td>
        </tr>
      </tbody>
    </table>
  </main>
    
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="..//JS/clientes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
